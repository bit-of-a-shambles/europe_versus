<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGradient)" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- EU letters -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">EU</text>
  
  <!-- Stars representing Europe -->
  <g fill="white" opacity="0.8">
    <circle cx="8" cy="8" r="1"/>
    <circle cx="24" cy="8" r="1"/>
    <circle cx="8" cy="24" r="1"/>
    <circle cx="24" cy="24" r="1"/>
    <circle cx="16" cy="6" r="1"/>
    <circle cx="6" cy="16" r="1"/>
    <circle cx="26" cy="16" r="1"/>
    <circle cx="16" cy="26" r="1"/>
  </g>
</svg>
  aggregation_method: population_weighted
  enabled: true

poverty_rate:
  source: owid
  owid_slug: share-of-population-in-extreme-poverty
  start_year: 1990
  end_year: 2024
  unit: "%"
  description: "Share of the population living below the International Poverty Line of $3 per day, adjusted for inflation and differences in living costs between countries. Measures absolute deprivation."

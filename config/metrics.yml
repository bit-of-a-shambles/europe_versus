# =============================================================================
# EUROSTAT METRICS - EARNINGS (fetched directly from Eurostat API)
# =============================================================================
# Dataset: earn_nt_net — Annual net earnings
# Case: P1_NCH_AW100 — Single person, no children, 100% of average wage
# Coverage: EU-27 + EFTA + UK + Turkey + US + Japan, years 2000–2024

annual_net_earnings_nominal:
  source: eurostat
  eurostat_dataset: earn_nt_net
  eurostat_currency: EUR
  start_year: 2000
  end_year: 2024
  unit: "€"
  description: "Annual net earnings of a single person without children at 100% of the average wage, in nominal euros. Based on Eurostat earn_nt_net. Covers takehome pay after income tax and social contributions. Does not adjust for cost-of-living differences."
  category: economy
  aggregation_method: population_weighted
  enabled: true

annual_net_earnings_pps:
  source: eurostat
  eurostat_dataset: earn_nt_net
  eurostat_currency: PPS
  start_year: 2000
  end_year: 2024
  unit: "PPS (EU27=100)"
  description: "Annual net earnings of a single person without children at 100% of the average wage, in purchasing power standard. Adjusts for price-level differences between countries so values are directly comparable in terms of real purchasing power."
  category: economy
  aggregation_method: population_weighted
  enabled: true

